<div class="account-layout">

    <!-- SIDEBAR -->
    <aside class="account-sidebar" [class.open]="sidebarOpen()">

        <div class="sidebar-header">
            <div class="header-main">
                <lucide-icon [name]="ICON_MAP.CircleUser" class="account-icon" size="18"></lucide-icon>
                <!-- <span class="title">{{ organization_name() }}</span> -->
                <div class="user-block">
                    <span class="title">{{ user.name }}</span>
                    <span class="subtitle">{{ organization_name() }}</span>
                </div>
            </div>

            <button class="close-btn " (click)="sidebarOpen.set(false)" aria-label="Cerrar menú">
                <lucide-icon [name]="ICON_MAP.X" size="20" />
            </button>
        </div>

        <nav class="menu">
            @for (section of menuSections; track section) {

            <div class="menu-section">

                <span class="section-label desktop-only">
                    {{ section.label }}
                </span>

                @for (item of section.items; track item) {
                <a [routerLink]="item.route" routerLinkActive="active" class="sidebar-item"
                    (click)="sidebarOpen.set(false)">
                    <lucide-icon [name]="item.icon" size="16" />
                    <span>{{ item.label }}</span>
                </a>

                }

            </div>

            }
        </nav>

        <div class="sidebar-footer">
            <button class="sidebar-item logout" (click)="logout()">
                <lucide-icon [name]="ICON_MAP.LogOut" size="16" />
                <span>Cerrar sesión</span>
            </button>
        </div>
    </aside>

    <!-- OVERLAY (mobile) -->
    @if(sidebarOpen()){
    <div class="overlay" (click)="sidebarOpen.set(false)">
    </div>
    }

    <!-- CONTENT -->
    <div class="account-content">

        <!-- TOPBAR -->
        <header class="account-topbar">

            <div class="left-actions">
                <button class="menu-btn mobile-only" (click)="sidebarOpen.set(true)">
                    <lucide-icon [name]="ICON_MAP.Menu" size="20" />
                </button>

                <button class="back-btn" (click)="goBackToSystem()">
                    <lucide-icon [name]="ICON_MAP.ArrowLeft" size="18" />
                    <span class="label">Volver</span>
                </button>
            </div>

            <h1 class="page-title">
                {{ pageTitle }}
                <span class="breadcrumb-hint">/ Mi cuenta</span>
            </h1>

            <div class="topbar-right">
                <button class="back-btn mobile-only" (click)="goBackToSystem()">
                    <lucide-icon [name]="ICON_MAP.ArrowLeft" size="18" />
                </button>

                <button class="icon-btn">
                    <lucide-icon [name]="ICON_MAP.Bell" size="18" />
                </button>

                <button class="icon-btn">
                    <lucide-icon [name]="ICON_MAP.Settings" size="18" />
                </button>
            </div>

        </header>

        <!-- PAGE -->
        <main class="page">
            @if(confirm.visible()){
            <app-confirm-dialog [title]="confirm.title()" [message]="confirm.message()" (confirm)="confirm.confirm()"
                (cancel)="confirm.close()">
            </app-confirm-dialog>
            }
            <router-outlet />
        </main>

    </div>

</div>
