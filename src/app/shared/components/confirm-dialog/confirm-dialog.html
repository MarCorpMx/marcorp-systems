<div class="overlay" (click)="cancel.emit()"></div>

<div class="dialog">
  <h3>{{ title }}</h3>
  <p style="white-space: pre-line;">{{ message }}</p>

  <div class="actions">
    <!-- <button class="btn cancel" (click)="cancel.emit()"> -->
    <button class="mar-btn-secondary" (click)="cancel.emit()">
      {{ confirmDialog.btnCancelText() }}
    </button>

    <!-- <button class="btn confirm" (click)="confirm.emit()"> -->
    <button class="mar-btn-primary" (click)="confirm.emit()">
      {{ confirmDialog.btnConfirmText() }}
    </button>
  </div>
</div>
