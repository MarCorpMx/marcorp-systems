<div class="animate-in fade-in slide-in-from-right-6 duration-700 ease-out text-center">

    <!-- ICON -->
    <div class="mb-6 flex justify-center">
        <div class="w-16 h-16 rounded-full bg-[#10b981]/10 flex items-center justify-center
                shadow-[0_0_20px_rgba(16,185,129,0.2)]">
            <lucide-icon [name]="Mail" size="28" class="text-[#10b981]" />
        </div>
    </div>

    <!-- TITLE -->
    <h2 class="text-2xl md:text-3xl font-bold text-white mb-2">
        Revisa tu correo
    </h2>

    <!-- DESC -->
    <p class="text-gray-400 text-sm md:text-base mb-6 max-w-sm mx-auto">
        Te enviamos un enlace de verificación.
        Confirma tu correo para continuar con la configuración de tu cuenta.
    </p>

    <p class="text-gray-500 text-sm mb-6">
        Enviado a:
        <span class="text-white font-medium">{{ email }}</span>
    </p>

    <!-- SUCCESS -->
    @if (sent()) {
    <div class="mb-4 flex items-center justify-center gap-2 text-emerald-400 text-sm 
            animate-in fade-in duration-300">

        <div class="w-5 h-5 flex items-center justify-center rounded-full 
                bg-emerald-500/10 border border-emerald-500/20">
            <lucide-icon [name]="Check" size="14"></lucide-icon>
        </div>

        <span class="font-medium">
            Correo reenviado correctamente
        </span>

    </div>
    }

    <!-- ERROR -->
    @if (error()) {
    <div class="mb-4 text-sm text-red-400">
        {{ error() }}
    </div>
    }

    <!-- BUTTON -->
    <button (click)="resendEmail()" [disabled]="isSending() || cooldown() > 0" class="w-full bg-[#10b981] hover:bg-[#0da271] text-black font-bold py-3 px-6 rounded-lg
           transition-all duration-300 transform hover:scale-[1.02]
           disabled:opacity-50 disabled:cursor-not-allowed
           shadow-[0_8px_30px_rgba(16,185,129,0.35)]">

        @if (isSending()) {
        Enviando...
        } @else if (cooldown() > 0) {
        Reenviar en {{ cooldown() }}s
        } @else {
        Reenviar correo
        }

    </button>

    <!-- EXTRA -->
    <p class="mt-6 text-xs text-gray-500">
        ¿No encuentras el correo? Revisa tu carpeta de spam.
    </p>

</div>
