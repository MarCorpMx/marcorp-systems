<div class="w-full max-w-2xl mx-auto">

    <!-- CARD -->
    <div class="bg-[var(--bg-surface)] 
                border border-[var(--border-soft)] 
                shadow-[var(--shadow-soft)] 
                rounded-2xl p-6 md:p-8">

        <!-- HEADER -->
        <div class="text-center mb-6">
            <h2 class="text-xl md:text-2xl font-semibold text-[var(--text-primary)]">
                Crea tu primer servicio
            </h2>

            <p class="text-sm text-[var(--text-secondary)] mt-1">
                Esto es lo que tus clientes podrán agendar
            </p>
        </div>

        <!-- LOADING -->
        @if (loading) {
        <div class="space-y-4 animate-pulse">

            <div class="h-4 w-1/2 mx-auto bg-[var(--bg-surface-soft)] rounded"></div>

            <div class="space-y-3 mt-4">
                <div class="h-10 bg-[var(--bg-surface-soft)] rounded-xl"></div>
                <div class="h-10 bg-[var(--bg-surface-soft)] rounded-xl"></div>
                <div class="h-10 bg-[var(--bg-surface-soft)] rounded-xl"></div>
            </div>

            <div class="h-12 bg-[var(--bg-surface-soft)] rounded-xl mt-4"></div>

        </div>
        }

        <!-- FORM -->
        @if (!loading) {

        <form [formGroup]="form" (ngSubmit)="save()" class="space-y-5">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <!-- NAME -->
                <div class="md:col-span-2">
                    <label class="text-sm text-[var(--text-secondary)]">
                        Nombre del servicio *
                    </label>

                    <input type="text" formControlName="name" class="input-primary">

                    @if (form.get('name')?.touched && form.get('name')?.invalid) {
                    <small class="text-red-400 text-xs mt-1 block">
                        Campo obligatorio
                    </small>
                    }
                </div>

                <!-- DURACIÓN -->
                <div>
                    <label class="text-sm text-[var(--text-secondary)]">
                        Duración (minutos)
                    </label>

                    <input type="number" formControlName="duration_minutes" class="input-primary">
                </div>

                <!-- PRECIO -->
                <div>
                    <label class="text-sm text-[var(--text-secondary)]">
                        Precio
                    </label>

                    <input type="number" formControlName="price" class="input-primary">
                </div>

            </div>

            <!-- MODALIDAD -->
            <div>
                <label class="text-sm text-[var(--text-secondary)] block mb-2">
                    Modalidad
                </label>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">

                    <!-- ONLINE -->
                    <button type="button" (click)="form.patchValue({ mode: 'online' })" [ngClass]="form.value.mode === 'online'
                            ? 'bg-[var(--system-primary)] text-black border-transparent shadow'
                            : 'bg-[var(--bg-surface-soft)] text-[var(--text-secondary)] border-[var(--border-soft)]'"
                        class="flex flex-col items-center justify-center gap-1
                               px-3 py-3 rounded-xl border
                               text-xs transition cursor-pointer hover:scale-[1.02]">

                        <lucide-icon [name]="Video" class="w-4 h-4"></lucide-icon>
                        Online
                    </button>

                    <!-- PRESENCIAL -->
                    <button type="button" (click)="form.patchValue({ mode: 'presential' })" [ngClass]="form.value.mode === 'presential'
                            ? 'bg-[var(--system-primary)] text-black border-transparent shadow'
                            : 'bg-[var(--bg-surface-soft)] text-[var(--text-secondary)] border-[var(--border-soft)]'"
                        class="flex flex-col items-center justify-center gap-1
                               px-3 py-3 rounded-xl border
                               text-xs transition cursor-pointer hover:scale-[1.02]">

                        <lucide-icon [name]="MapPin" class="w-4 h-4"></lucide-icon>
                        Presencial
                    </button>

                    <!-- HÍBRIDO -->
                    <button type="button" (click)="form.patchValue({ mode: 'hybrid' })" [ngClass]="form.value.mode === 'hybrid'
                            ? 'bg-[var(--system-primary)] text-black border-transparent shadow'
                            : 'bg-[var(--bg-surface-soft)] text-[var(--text-secondary)] border-[var(--border-soft)]'"
                        class="flex flex-col items-center justify-center gap-1
                               px-3 py-3 rounded-xl border
                               text-xs transition cursor-pointer hover:scale-[1.02]">

                        <lucide-icon [name]="Video" class="w-4 h-4"></lucide-icon>
                        Híbrido
                    </button>

                </div>
            </div>

            <!-- ACTION -->
            <div class="pt-2">
<!-- [disabled]="saving || form.invalid" -->
                <button type="submit" [disabled]="saving" class="w-full md:w-auto md:ml-auto block
                           bg-[var(--brand-primary)]
                           hover:bg-[var(--brand-primary-dark)]
                           text-[var(--text-primary)]
                           transition px-6 py-2.5 rounded-xl font-medium
                           disabled:opacity-50">

                    {{ saving ? 'Guardando...' : 'Continuar' }}

                </button>
            </div>

            <!-- UX TIP -->
            <p class="text-xs text-[var(--text-secondary)] text-center">
                Podrás agregar más detalles después
            </p>

        </form>

        }

    </div>
</div>
